<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil | Finpy</title>

<link rel="stylesheet" href="static/css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.sidebar-profile-link{
    text-decoration:none;
    color:inherit;
    display:block;
}

.profile-container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

.profile-card{
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.profile-header{
    text-align:center;
    margin-bottom:30px;
}

.profile-avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#07C7B7;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:700;
    margin:0 auto 15px;
}

.profile-title{
    font-size:28px;
    font-weight:700;
    color:#2C3E50;
}

.profile-subtitle{
    color:#6b7280;
    margin-top:5px;
}

.profile-info{
    display:grid;
    gap:18px;
}

.profile-field{
    display:flex;
    flex-direction:column;
}

.profile-field label{
    font-size:13px;
    font-weight:600;
    color:#6b7280;
    margin-bottom:6px;
}

.profile-field input{
    padding:14px;
    border:1px solid #dfe4ea;
    border-radius:12px;
    background:#f8fafc;
    font-size:15px;
}

.profile-actions{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

.btn-dashboard{
    background:#07C7B7;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.3s;
}

.btn-dashboard:hover{
    background:#05a99b;
}
</style>
</head>
<body>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-header">
            <div class="profile-avatar" id="avatarPerfil">?</div>
            <div class="profile-title">Mi Perfil</div>
            <div class="profile-subtitle">
                Información de tu cuenta Finpy
            </div>
        </div>

        <div class="profile-info">

            <div class="profile-field">
                <label>Nombre</label>
                <input type="text" id="nombrePerfil" readonly>
            </div>

            <div class="profile-field">
                <label>Apellido</label>
                <input type="text" id="apellidoPerfil" readonly>
            </div>

            <div class="profile-field">
                <label>Correo electrónico</label>
                <input type="email" id="emailPerfil" readonly>
            </div>

            <div class="profile-field">
                <label>Plan</label>
                <input type="text" value="Plan gratuito" readonly>
            </div>

        </div>

        <div class="profile-actions">
            <button class="btn-dashboard"
                    onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-arrow-left"></i>
                Volver al Dashboard
            </button>
        </div>

    </div>

</div>

<script src="static/js/storage.js"></script>

<script>
if (!FINPY.getCurrentUser()) {
    window.location.replace('index.html');
}

const user = FINPY.getCurrentUser();

if(user){

    document.getElementById('nombrePerfil').value =
        user.nombre || '';

    document.getElementById('apellidoPerfil').value =
        user.apellido || '';

    document.getElementById('emailPerfil').value =
        user.email || '';

    document.getElementById('avatarPerfil').textContent =
        (user.nombre || '?').charAt(0).toUpperCase();
}
</script>

</body>
</html>
