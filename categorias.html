<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías — Finpy</title>
  <link rel="stylesheet" href="static/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .cat-section-title { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin:24px 0 12px; }
    .cat-section-title:first-child { margin-top:0; }
    .cat-grid { display:flex; flex-wrap:wrap; gap:10px; min-height:40px; }
    .cat-card { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border:1.5px solid var(--border); border-radius:12px; font-size:13px; font-weight:500; color:var(--text); }
    .cat-ico { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .cat-ico.teal   { background:#07C7B720; color:#07C7B7; }
    .cat-ico.blue   { background:#3b82f620; color:#3b82f6; }
    .cat-ico.purple { background:#7C6CF620; color:#7C6CF6; }
    .cat-ico.green  { background:#22c55e20; color:#22c55e; }
    .cat-ico.red    { background:#ef444420; color:#ef4444; }
    .cat-ico.white  { background:#94a3b820; color:#94a3b8; }
    .cat-ico.muted  { background:#64748b20; color:#64748b; }
    .btn-del-cat { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:3px 5px; border-radius:6px; font-size:12px; transition:all .15s; line-height:1; }
    .btn-del-cat:hover { background:#fee2e2; color:#ef4444; }
    .cat-predefinida { opacity:.7; }
    .empty-cats { color:var(--text-muted); font-size:13px; padding:8px 0; }
  </style>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="static/img/Finpy Blanco2.png" alt="Finpy"></div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a href="dashboard.html"><i class="fa-solid fa-house"></i> Inicio</a>
      <a href="transacciones.html"><i class="fa-solid fa-arrow-right-arrow-left"></i> Transacciones</a>
      <a href="estadisticas.html"><i class="fa-solid fa-chart-line"></i> Estadísticas</a>
      <a href="metas.html"><i class="fa-solid fa-bullseye"></i> Metas</a>
      <span class="nav-section-label">Cuenta</span>
      <a href="categorias.html" class="active"><i class="fa-solid fa-tags"></i> Categorías</a>
      <a href="alertas.html"><i class="fa-solid fa-bell"></i> Alertas</a>
      <a href="#" id="logoutLink"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar sidebar-user-avatar">?</div>
        <div class="user-info"><span class="user-name sidebar-user-name">—</span><span class="user-role">Plan gratuito</span></div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-greeting"><h1>Categorías</h1><p id="fechaHoy"></p></div>
      <div class="topbar-actions">
        <button class="btn-add" id="btnNuevaCat"><i class="fa-solid fa-plus"></i> Nueva categoría</button>
      </div>
    </header>

    <div class="content-area">
      <div class="card">
        <div class="card-body">
          <p class="cat-section-title">Predefinidas</p>
          <div class="cat-grid" id="predefinedGrid"></div>
          <p class="cat-section-title">Mis categorías</p>
          <div class="cat-grid" id="misCategoriasGrid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CATEGORÍA -->
<div class="modal-overlay" id="modalCat">
  <div class="modal">
    <div class="modal-header"><h3>Nueva categoría</h3><button class="btn-close" id="btnCerrarCat"><i class="fa-solid fa-xmark"></i></button></div>
    <form id="catForm">
      <div class="form-group"><i class="fa-solid fa-tag"></i><input type="text" id="catNombre" placeholder="Nombre de la categoría" required></div>
      <div class="form-group">
        <i class="fa-solid fa-icons"></i>
        <select id="catIcono">
          <option value="fa-tag">Etiqueta</option>
          <option value="fa-utensils">Comida</option>
          <option value="fa-car">Transporte</option>
          <option value="fa-graduation-cap">Educación</option>
          <option value="fa-gamepad">Ocio</option>
          <option value="fa-plane">Viajes</option>
          <option value="fa-heart-pulse">Salud</option>
          <option value="fa-shirt">Ropa</option>
          <option value="fa-house">Hogar</option>
          <option value="fa-mobile-screen">Tecnología</option>
          <option value="fa-dumbbell">Deporte</option>
          <option value="fa-book">Libros</option>
        </select>
      </div>
      <div class="form-group">
        <i class="fa-solid fa-palette"></i>
        <select id="catColor">
          <option value="teal">Verde agua</option>
          <option value="blue">Azul</option>
          <option value="purple">Morado</option>
          <option value="green">Verde</option>
          <option value="red">Rojo</option>
          <option value="white">Gris</option>
        </select>
      </div>
      <div id="catError" class="form-error" style="display:none;"></div>
      <button type="submit" class="btn-submit">Crear categoría</button>
    </form>
  </div>
</div>

<script src="static/js/storage.js"></script>
<script src="static/js/app.js"></script>
<script>
function catCardHTML(cat, canDelete) {
  var del = canDelete
    ? '<button class="btn-del-cat" onclick="window.deleteCategory(\'' + cat.id + '\')" title="Eliminar"><i class="fa-solid fa-xmark"></i></button>'
    : '';
  return '<div class="cat-card' + (cat.es_predefinida ? ' cat-predefinida' : '') + '" id="catcard-' + cat.id + '">' +
    '<div class="cat-ico ' + cat.color + '"><i class="fa-solid ' + cat.icono + '"></i></div>' +
    '<span>' + esc(cat.nombre) + '</span>' + del + '</div>';
}

function renderPage() {
  if (!FINPY.requireAuth()) return;
  var user  = FINPY.getCurrentUser();
  var allCats = FINPY.getCategories(user.id);
  var predef  = allCats.filter(function (c) { return c.es_predefinida; });
  var custom  = allCats.filter(function (c) { return !c.es_predefinida; });

  document.getElementById('predefinedGrid').innerHTML = predef.map(function (c) { return catCardHTML(c, false); }).join('');
  var custGrid = document.getElementById('misCategoriasGrid');
  custGrid.innerHTML = custom.length === 0
    ? '<p class="empty-cats">Aún no tienes categorías personalizadas.</p>'
    : custom.map(function (c) { return catCardHTML(c, true); }).join('');
}

window.renderPage = renderPage;

window.deleteCategory = function (id) {
  if (!confirm('¿Eliminar esta categoría?')) return;
  FINPY.deleteCategory(id);
  showToast('Categoría eliminada', 'success');
  renderPage();
};

document.addEventListener('DOMContentLoaded', renderPage);
</script>
</body>
</html>
